<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>K8s Demo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #38bdf8; }
    p.subtitle { color: #94a3b8; margin-bottom: 32px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; width: 100%; max-width: 600px; margin-bottom: 20px; border: 1px solid #334155; }
    .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .status { display: flex; align-items: center; gap: 10px; font-size: 1rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; margin-bottom: 10px; }
    button { padding: 10px 20px; border-radius: 8px; border: none; background: #0ea5e9; color: #fff; font-size: 1rem; cursor: pointer; width: 100%; }
    button:hover { background: #38bdf8; }
    #userList { list-style: none; margin-top: 16px; }
    #userList li { padding: 10px 14px; background: #0f172a; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
    .error { color: #f87171; font-size: 0.875rem; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🚀 K8s Demo App</h1>
  <p class="subtitle">Multi-service app running on Kind</p>

  <div class="card">
    <h2>Backend Health</h2>
    <div class="status">
      <div class="dot" id="healthDot" style="background:#94a3b8"></div>
      <span id="healthText">Checking...</span>
    </div>
  </div>

  <div class="card">
    <h2>Add User</h2>
    <input type="text" id="nameInput" placeholder="Enter a name" />
    <button onclick="addUser()">Add User</button>
    <p class="error" id="errMsg"></p>
  </div>

  <div class="card">
    <h2>Users from Database</h2>
    <button onclick="loadUsers()" style="background:#475569;margin-bottom:16px">Refresh</button>
    <ul id="userList"><li>Loading...</li></ul>
  </div>

  <script>
    const API = '/api';

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('healthDot').style.background = '#22c55e';
        document.getElementById('healthText').textContent = `Backend OK — DB: ${data.db}`;
      } catch {
        document.getElementById('healthDot').style.background = '#f87171';
        document.getElementById('healthText').textContent = 'Backend unreachable';
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API}/users`);
        const users = await res.json();
        const list = document.getElementById('userList');
        list.innerHTML = users.length
          ? users.map(u => `<li>👤 ${u.name} <small style="color:#64748b">— ${new Date(u.created_at).toLocaleString()}</small></li>`).join('')
          : '<li style="color:#64748b">No users yet. Add one above!</li>';
      } catch {
        document.getElementById('userList').innerHTML = '<li class="error">Failed to load users</li>';
      }
    }

    async function addUser() {
      const name = document.getElementById('nameInput').value.trim();
      document.getElementById('errMsg').textContent = '';
      if (!name) { document.getElementById('errMsg').textContent = 'Name cannot be empty'; return; }
      try {
        await fetch(`${API}/users`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
        document.getElementById('nameInput').value = '';
        loadUsers();
      } catch {
        document.getElementById('errMsg').textContent = 'Failed to add user';
      }
    }

    checkHealth();
    loadUsers();
  </script>
</body>
</html>
